services:
  - type: web
    name: jpfirecalc
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --workers 2 --threads 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a random secret
    healthCheckPath: /
