{% extends "base.html" %}

{% block title %}{{ code }} Error — JPFIRECalc{% endblock %}

{% block content %}
<div class="container">
  <div class="error-page">
    <div class="error-page__code">{{ code }}</div>
    <h1 class="error-page__title">{{ title }}</h1>
    <p class="error-page__body">{{ message }}</p>
    <div class="error-page__actions">
      <a href="{{ url_for('scenarios.index') }}" class="btn btn--primary" data-i18n="error.back">Go to Dashboard</a>
      <a href="{{ url_for('main.index') }}" class="btn btn--ghost" data-i18n="error.home">Home</a>
    </div>
  </div>
</div>
{% endblock %}
